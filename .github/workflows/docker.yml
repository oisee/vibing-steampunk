name: Docker

# Builds and pushes the vsp container image to GitHub Container Registry (GHCR).
# No Docker Hub account required — authentication uses the built-in GITHUB_TOKEN.
#
# Image: ghcr.io/oisee/vsp
# Platforms: linux/amd64, linux/arm64
#
# Triggers:
#   - Automatically after a version tag (v*) is pushed — which happens at the end
#     of the release.yml workflow (step: "Tag and push").
#   - Manually via workflow_dispatch for ad-hoc builds.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (default: git tag or 'manual')"
        required: false
        default: ""

permissions:
  contents: read   # checkout
  packages: write  # push to ghcr.io

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. QEMU — enables cross-compilation of linux/arm64 on the amd64 runner
      # ------------------------------------------------------------------ #
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ------------------------------------------------------------------ #
      # 3. Buildx — multi-platform builder
      # ------------------------------------------------------------------ #
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------------ #
      # 4. Login to GHCR — uses the built-in GITHUB_TOKEN, no secrets needed
      # ------------------------------------------------------------------ #
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------ #
      # 5. Generate tags and OCI labels from the git tag
      #
      #    For a tag like v2.22.0 this produces:
      #      ghcr.io/oisee/vsp:2.22.0
      #      ghcr.io/oisee/vsp:2.22
      #      ghcr.io/oisee/vsp:2
      #      ghcr.io/oisee/vsp:latest   (only for non-pre-release tags)
      #
      #    Pre-release tags (v2.22.0-rc1, v2.22.0-beta) do NOT receive `latest`.
      # ------------------------------------------------------------------ #
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/oisee/vsp
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=manual,enable=${{ github.event_name == 'workflow_dispatch' }}

      # ------------------------------------------------------------------ #
      # 6. Build and push
      #
      #    CGO_ENABLED=1 is required by go-sqlite3 (cache package).
      #    This differs from GoReleaser native builds (CGO_ENABLED=0) — both
      #    are intentional: native binaries avoid CGO for portability, while
      #    the Docker image uses CGO inside Alpine for the sqlite cache.
      # ------------------------------------------------------------------ #
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          # Layer cache: reuse layers from the last build of the same branch/tag
          cache-from: type=gha
          cache-to: type=gha,mode=max
