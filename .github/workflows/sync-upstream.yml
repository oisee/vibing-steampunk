name: Sync with Upstream

# Watches upstream oisee/vibing-steampunk and either:
#   1. Opens a PR if the merge is clean (trivial sync), OR
#   2. Opens an issue asking for a manual sync if there are conflicts.
#
# It does NOT try to auto-resolve conflicts. Conflict resolution is the
# job of scripts/sync-upstream.sh run locally — see CLAUDE.md "Conflict
# Resolution Strategy" for the policy. Auto-resolving in CI was the
# cause of all the broken sync PRs from Feb–Apr 2026.

on:
  schedule:
    # Daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/oisee/vibing-steampunk.git || true
          git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "commits_behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Fork is $BEHIND commits behind upstream/main"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Fork is up to date with upstream/main"
          fi

      - name: Create sync branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH_NAME="sync-upstream-${TIMESTAMP}"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"
          git checkout -b "$BRANCH_NAME"

      - name: Attempt clean merge
        id: merge
        if: steps.check.outputs.has_changes == 'true'
        run: |
          if git merge upstream/main --no-edit; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
            echo "Clean merge succeeded"
          else
            echo "clean=false" >> "$GITHUB_OUTPUT"
            # Capture conflicting filenames as a single space-joined string.
            # Even if upstream contains exotic filenames, we only echo into
            # GITHUB_OUTPUT here and read it back via an env var below — never
            # interpolated directly into a shell command.
            CONFLICTS=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            echo "conflicting_files=$CONFLICTS" >> "$GITHUB_OUTPUT"
            echo "Merge has conflicts in: $CONFLICTS"
            git merge --abort
          fi

      - name: Fix import paths globally (clean-merge path only)
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.clean == 'true'
        run: |
          find . -name "*.go" -type f ! -path "./vendor/*" \
            -exec sed -i 's|github.com/oisee/vibing-steampunk|github.com/vinchacho/vibing-steampunk|g' {} +
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: fix import paths to vinchacho organization"
          fi

      - name: Update dependencies (clean-merge path only)
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.clean == 'true'
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            git add go.mod go.sum
            git commit -m "chore: update dependencies after upstream merge"
          fi

      - name: Build (clean-merge path only)
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.clean == 'true'
        run: go build -o vsp ./cmd/vsp

      - name: Run tests (clean-merge path only)
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.clean == 'true'
        run: go test ./... || echo "::warning::Some tests failed — review the PR"

      - name: Push sync branch (clean-merge path only)
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.clean == 'true'
        run: git push origin "$BRANCH_NAME"

      - name: Create Pull Request (clean-merge path only)
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.clean == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          COMMITS_BEHIND: ${{ steps.check.outputs.commits_behind }}
        run: |
          gh pr create \
            --repo "$GH_REPO" \
            --title "Sync with upstream ($COMMITS_BEHIND new commits)" \
            --body "Automated upstream sync from \`oisee/vibing-steampunk\`. Clean merge — no conflicts. Review tests and merge if green." \
            --base main \
            --head "$BRANCH_NAME"

      - name: Open issue on conflict (no PR created)
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.clean == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          COMMITS_BEHIND: ${{ steps.check.outputs.commits_behind }}
          CONFLICTING_FILES: ${{ steps.merge.outputs.conflicting_files }}
        run: |
          # Build the markdown bodies with printf so we don't have to worry
          # about multi-line strings tripping YAML's literal-block indentation
          # rules (heredocs would either break YAML or require dedenting).
          printf '%s\n' \
            "Still behind: ${COMMITS_BEHIND} commits." \
            "Conflicting files: \`${CONFLICTING_FILES}\`" \
            "Run \`./scripts/sync-upstream.sh\` locally to resolve." \
            > /tmp/comment-body.md

          printf '%s\n' \
            "The daily upstream sync workflow detected conflicts that require manual resolution." \
            "" \
            "**Commits behind upstream/main:** ${COMMITS_BEHIND}" \
            "**Conflicting files:** \`${CONFLICTING_FILES}\`" \
            "" \
            "### How to resolve" \
            "" \
            "Run the local sync script — it has policy-aware conflict resolution and a human-in-the-loop step:" \
            "" \
            '```bash' \
            "git fetch upstream" \
            "./scripts/sync-upstream.sh" \
            '```' \
            "" \
            "See [\`CLAUDE.md\`](../blob/main/CLAUDE.md) → \"Conflict Resolution Strategy\" for the per-file policy (CLAUDE.md HEAD wins, README.md keeps vinchacho URLs, articles/ keeps oisee references, etc)." \
            "" \
            "This issue will be auto-commented if the situation persists, and can be closed once the sync is done." \
            > /tmp/issue-body.md

          # Avoid duplicate issues — search for an existing open one with the same title prefix
          EXISTING=$(gh issue list --repo "$GH_REPO" \
            --state open \
            --search 'in:title "Manual upstream sync needed"' \
            --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "Existing open issue #$EXISTING already tracks manual sync — adding a comment"
            gh issue comment "$EXISTING" --repo "$GH_REPO" --body-file /tmp/comment-body.md
          else
            gh issue create \
              --repo "$GH_REPO" \
              --title "Manual upstream sync needed ($COMMITS_BEHIND commits behind)" \
              --body-file /tmp/issue-body.md
            echo "Created tracking issue"
          fi

      - name: Sync status summary
        if: always()
        env:
          HAS_CHANGES: ${{ steps.check.outputs.has_changes }}
          MERGE_CLEAN: ${{ steps.merge.outputs.clean }}
          COMMITS_BEHIND: ${{ steps.check.outputs.commits_behind }}
          CONFLICTING_FILES: ${{ steps.merge.outputs.conflicting_files }}
        run: |
          {
            echo "## Upstream Sync Status"
            echo ""
            if [ "$HAS_CHANGES" = "false" ]; then
              echo "✅ Fork is up to date with upstream/main"
            elif [ "$MERGE_CLEAN" = "true" ]; then
              echo "✅ Clean merge — PR opened for $COMMITS_BEHIND commits"
            else
              echo "⚠️ Conflicts detected — issue opened for manual sync"
              echo ""
              echo "**Commits behind:** $COMMITS_BEHIND"
              echo "**Conflicts:** \`$CONFLICTING_FILES\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
